server:
  port: 8080
  max_upload_size_mb: 20

excel:
  skip_sheets:
    - Changelog
    - Daftar Isi
    - Step
  header_row: 9          # 1-indexed row where column headers are
  data_start_row: 10     # first test case row

  metadata:
    - key: provider_name
      label: "Nama Penyedia Layanan:"
      row: 3
      col: 1             # column B (0-indexed: A=0, B=1)
    - key: partner_name
      label: "Nama Pengguna Layanan :"
      row: 5
      col: 1
    - key: test_date
      label: "Tanggal Pengujian:"
      row: 6
      col: 1

  columns:
    no:              0   # Column A
    service:         1   # Column B
    scenario:        2   # Column C
    expected_result: 3   # Column D
    request:         4   # Column E
    response:        5   # Column F
    result:          6   # Column G
    notes:           7   # Column H

validation:
  request:
    required: true
    empty_sentinel_values:
      - "URL Endpoint:\n Header Request:\n Request Body:"
      - "URL Endpoint: Header Request: Request Body:"
      - ""
    error_message: "Request belum diisi"
    # Rule 3: every test case Request must contain all of these header keys
    required_headers:
      - "URL"
      - "Content-Type"
      - "Authorization"
      - "X-SIGNATURE"
      - "X-TIMESTAMP"
      - "X-EXTERNAL-ID"
      - "X-PARTNER-ID"
    required_header_error_message: "Header wajib tidak ditemukan di Request: %s"
    # Rule 4: these header values must be unique across all rows in the same sheet
    unique_headers:
      - "X-SIGNATURE"
      - "X-TIMESTAMP"
    unique_header_error_message: "Nilai %s harus unik untuk setiap test case, ditemukan nilai yang sama"

  response:
    required: true
    empty_sentinel_values:
      - "Response Body:"
      - ""
    error_message: "Response Body belum diisi"
    # Rule 2: at least one keyword from Expected Result must appear in Response
    match_expected_result: true
    match_error_message: "Response tidak sesuai dengan Expected Result"
    # Rule 5: if Expected Result contains this keyword, Response must include the key below
    success_keyword: "Successful"
    success_must_contain: "responseMessage"
    success_error_message: "responseMessage wajib ada di Response jika Expected Result mengandung 'Successful'"

  # Rule 6: Result and Notes columns are not validated
  result:
    required: false
    allowed_values: []
    error_message: ""
    invalid_value_message: ""

  notes:
    required_if_result: ""
    error_message: ""
